spring.application.name=backend

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/siso}
spring.datasource.username=${DATABASE_USER:siso}
spring.datasource.password=${DATABASE_PASSWORD:siso_dev_only}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.ip-hash-salt=${IP_HASH_SALT:local-dev-only-salt}
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:local-dev-only-password}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ResponseStatusException의 reason이 프론트 에러 메시지로 그대로 노출됨(5절
# "사유 안내") — 전부 의도적으로 사용자에게 보여줄 한글 메시지로 작성한
# 것들이라 always로 켜도 안전. 스택트레이스는 여전히 안 나감.
# Boot 4.0부터 server.error.include-message가 deprecated되고
# spring.web.error.include-message로 바뀜(context7 공식문서로 확인).
spring.web.error.include-message=always
